# Minimal dev-stack reverse proxy in front of the Django app.
# Serves /static/ from the shared volume populated by `collectstatic` in
# the web image; proxies everything else to gunicorn on web:8000.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include            /etc/nginx/mime.types;
    default_type       application/octet-stream;
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    client_max_body_size 32m;

    # On-the-fly gzip for the response body of text-like resources.
    # gzip_static reuses a pre-built .gz sibling if present, falling
    # back to dynamic compression otherwise. The text bundles are
    # large enough to benefit (CSS ~250 KB → ~30 KB compressed).
    gzip               on;
    gzip_static        on;
    gzip_vary          on;
    gzip_min_length    256;
    gzip_comp_level    5;
    gzip_proxied       any;
    gzip_types         text/plain
                       text/css
                       text/xml
                       application/javascript
                       application/json
                       application/xml
                       application/rss+xml
                       application/atom+xml
                       application/x-research-info-systems
                       application/x-bibtex
                       image/svg+xml
                       font/ttf
                       font/otf;

    upstream haskala_web {
        server         web:8000;
        # Re-use upstream TCP connections instead of opening a new one
        # per request.
        keepalive      16;
    }

    # AWStats consumes one combined-format access log per virtual site.
    # In dev /var/local/log/ is not bind-mounted so nginx writes here
    # locally (and never gets reaped); in prod the same path is shared
    # with the awstats + cron containers.
    log_format awstats_combined '$remote_addr - $remote_user [$time_local] '
                                '"$request" $status $body_bytes_sent '
                                '"$http_referer" "$http_user_agent"';

    # Docker's embedded DNS resolver. With it, `proxy_pass http://$var/`
    # form below resolves at request time instead of at config-load
    # time, which is how dev keeps starting cleanly even though the
    # awstats / monit hostnames only exist under the prod overlay.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen      80;
        server_name _;

        # Static assets get a long browser cache lifetime and the
        # `immutable` hint. The bundles do not yet carry a content
        # hash in their filenames, so the lifetime is moderate (30d)
        # rather than the typical 1y; bump to 1y once we switch on
        # ManifestStaticFilesStorage.
        location /static/ {
            alias /var/www/static/;
            access_log off;
            # Single Cache-Control via add_header (the `expires`
            # directive would duplicate this header). One year because
            # ManifestStaticFilesStorage now produces content-hashed
            # filenames, so a new deploy always lands at a different
            # URL and old caches never need to be revalidated for the
            # files they hold.
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            access_log         /var/local/log/access.log awstats_combined;
            proxy_pass         http://haskala_web;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # AWStats web statistics. Production-only; in dev nginx returns
        # 502 because the awstats container does not exist.
        # Set $upstream so resolution happens at request time.
        location /awstats/ {
            set $awstats_upstream "awstats";
            rewrite ^/awstats/?(.*)$ /$1 break;
            proxy_pass         http://$awstats_upstream:80/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Monit watchdog UI. Same dev/prod split as /awstats/. The
        # upstream container ships its own basic auth via MONIT_USERNAME
        # / MONIT_PASSWORD, so no extra auth_basic block is needed here.
        location /monit/ {
            set $monit_upstream "monit";
            rewrite ^/monit/?(.*)$ /$1 break;
            proxy_pass         http://$monit_upstream:2812/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
