# Minimal dev-stack reverse proxy in front of the Django app.
# Serves /static/ from the shared volume populated by `collectstatic` in
# the web image; proxies everything else to gunicorn on web:8000.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include            /etc/nginx/mime.types;
    default_type       application/octet-stream;
    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 32m;

    upstream haskala_web {
        server web:8000;
    }

    server {
        listen      80;
        server_name _;

        location /static/ {
            alias /var/www/static/;
            access_log off;
            expires 7d;
        }

        location / {
            proxy_pass         http://haskala_web;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
