{% load value_filters %}
<ul class="list-unstyled mb-0">
    {% for pf in book.prefaces.all %}
        <li class="mb-2" dir="auto">
            <strong>{{ pf.title|default:"Preface" }}</strong>
            {% if pf.number %}
                <span class="text-muted small">&middot; #{{ pf.number }}</span>
            {% endif %}
            {% if pf.writer %}
                &mdash; by
                <a href="{% url 'person-detail' pf.writer.slug %}" class="link-primary">{{ pf.writer }}</a>
            {% endif %}
            {% if pf.notes %}
                <div class="small text-muted">{{ pf.notes|linebreaksbr }}</div>
            {% endif %}
        </li>
    {% endfor %}
</ul>
