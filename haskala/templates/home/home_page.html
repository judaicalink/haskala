{% extends "base.html" %}
{% load wagtailcore_tags %}
{% load topic_tags %}

{% block title %}The Library of the Haskala{% endblock %}

{% block body_class %}front{% endblock %}

{% block content %}
    <div class="container homepage my-4">

        <section class="homepage-search mb-5">
            <form action="{% url 'search' %}" method="get"
                  id="search-api-page-search-form-haskala"
                  class="search-hero">
                <div class="search-hero-inner mx-auto" style="max-width: 720px;">
                    <div class="input-group input-group-lg">
                        <input type="text"
                               name="q"
                               id="id_q"
                               class="form-control rounded-start-5"
                               placeholder="Search the Library of the Haskala"
                               aria-label="Search">
                        <button type="submit"
                                class="btn btn-primary rounded-end-5 text-white px-4">
                            <i class="bi bi-search"></i>
                            <span class="visually-hidden">Search</span>
                        </button>
                    </div>
                </div>
            </form>
        </section>

        <section class="homepage-browse mb-5">
            <h2 class="h4 text-center mb-4">Browse the library</h2>
            <div class="row g-3 row-cols-2 row-cols-md-4">
                <div class="col">
                    <a href="{% url 'books-list' %}"
                       class="card h-100 text-decoration-none text-body">
                        <div class="card-body text-center">
                            <i class="bi bi-book-half display-6 text-primary"></i>
                            <h3 class="h6 mt-2 mb-0">Books</h3>
                        </div>
                    </a>
                </div>
                <div class="col">
                    <a href="{% url 'persons-list' %}"
                       class="card h-100 text-decoration-none text-body">
                        <div class="card-body text-center">
                            <i class="bi bi-people display-6 text-primary"></i>
                            <h3 class="h6 mt-2 mb-0">Persons</h3>
                        </div>
                    </a>
                </div>
                <div class="col">
                    <a href="{% url 'places-list' %}"
                       class="card h-100 text-decoration-none text-body">
                        <div class="card-body text-center">
                            <i class="bi bi-geo-alt display-6 text-primary"></i>
                            <h3 class="h6 mt-2 mb-0">Places</h3>
                        </div>
                    </a>
                </div>
                <div class="col">
                    <a href="{% url 'digital-books-list' %}"
                       class="card h-100 text-decoration-none text-body">
                        <div class="card-body text-center">
                            <i class="bi bi-cloud-download display-6 text-primary"></i>
                            <h3 class="h6 mt-2 mb-0">Digital books</h3>
                        </div>
                    </a>
                </div>
            </div>
        </section>

        {% topic_tagcloud %}
    </div>
{% endblock %}
