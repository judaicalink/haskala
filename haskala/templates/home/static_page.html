{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block title %}{{ page.seo_title|default:page.title }}{% endblock %}

{% block content %}
    <div class="container static-page my-4">
        <div class="row">
            <article class="col-md-9 col-lg-8 mx-auto">
                <header class="static-page__header mb-4">
                    <p class="text-muted small mb-1">
                        <a href="/">Home</a>
                        <span aria-hidden="true">&rsaquo;</span>
                        <span>{{ page.title }}</span>
                    </p>
                    <h1 class="static-page__title h2 mb-3">{{ page.title }}</h1>
                </header>

                <div class="static-page__body">
                    {{ page.body|richtext }}
                </div>
            </article>
        </div>
    </div>
{% endblock %}
