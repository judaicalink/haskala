# docker-compose.yml
#
# Full development stack for the Haskala library platform.
# Services:
#   web         - Django/Wagtail application (gunicorn behind nginx)
#   db          - PostgreSQL 16 seeded from ./haskala.sql on first boot
#   redis       - cache and django-redis backend
#   solr        - search index
#   fuseki      - RDF triple store
#   mailserver  - MailHog dev SMTP/HTTP UI
#   nginx       - reverse proxy in front of web
#   backups     - scheduled pg_dump of db into the named backups_data volume

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: haskala
    volumes:
      - .:/app
      # Keep build artifacts produced inside the image from being shadowed
      # by the bind mount above:
      - /app/node_modules
      - /app/haskala/static/css
      - /app/haskala/static/js
      # STATIC_ROOT (per settings.base): /app/static is also where
      # collectstatic writes during the image build; sharing it with nginx
      # via the named volume lets nginx serve those files directly.
      - static_data:/app/static
    expose:
      - "8000"
    env_file:
      - ./.env
    environment:
      # Override the values in .env that point at the host's localhost so
      # the container talks to the sibling services instead.
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      REDIS_URL: redis://redis:6379/haskala
      SOLR_URL: http://solr:8983/solr/haskala
      FUSEKI_URL: http://fuseki:3030/haskala
      EMAIL_HOST: mailserver
      EMAIL_PORT: "1025"
      DJANGO_SETTINGS_MODULE: haskala.settings.dev
      # SECRET_KEY in .env contains literal '$' sequences that docker compose
      # would try to interpolate as variables. Override here with a value
      # that is safe to ship in compose (dev-only stack).
      SECRET_KEY: "docker-dev-insecure-key-only-for-local-stack"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: haskala
      POSTGRES_USER: haskala
      POSTGRES_PASSWORD: haskala
    volumes:
      - ./haskala.sql:/docker-entrypoint-initdb.d/haskala.sql:ro
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haskala -d haskala"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    # No host port mapping: the web container reaches redis via the
    # internal service name "redis". Exposing on the host conflicts with
    # any local Redis already running on 6379.

  solr:
    image: solr:8
    command:
      - solr-precreate
      - haskala
    ports:
      - "8983:8983"

  fuseki:
    image: stain/jena-fuseki
    environment:
      - ADMIN_PASSWORD=admin
    ports:
      - "3030:3030"
    command: /jena-fuseki/fuseki-server --mem --update --localhost /haskala

  mailserver:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  nginx:
    image: nginx:alpine
    depends_on:
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_data:/var/www/static:ro
    ports:
      # Host port 8080 to avoid clashing with any local web server
      # already bound to 80; site is then reachable at http://localhost:8080
      - "8080:80"

  backups:
    build:
      context: ./docker/backups
    image: haskala-backups
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: haskala
      POSTGRES_USER: haskala
      POSTGRES_PASSWORD: haskala
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: "14"
      TZ: Europe/Berlin
    volumes:
      - backups_data:/backups
    restart: unless-stopped

volumes:
  postgres_data:
  static_data:
  backups_data:
