name: Django CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 4
      matrix:
        # Quoted so YAML doesn't read 3.12 as the number 3.12 (which it
        # would silently truncate to 3.1 and look up a non-existent
        # Python release). The Docker image ships 3.12.
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: haskala
          POSTGRES_USER: haskala
          POSTGRES_PASSWORD: haskala
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U haskala -d haskala"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: haskala.settings.dev
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_NAME: haskala
      DATABASE_USER: haskala
      DATABASE_PASSWORD: haskala
      SECRET_KEY: ci-insecure-key-only-used-by-the-test-runner

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system packages for psycopg2 / Pillow / GeoDjango / pg_dump
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libpq-dev postgresql-client \
            libjpeg-dev zlib1g-dev libwebp-dev libgdal-dev gdal-bin

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django tests
        run: |
          python manage.py test --noinput --verbosity=2

      - name: Backup + restore smoke test
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: haskala
          POSTGRES_USER: haskala
          POSTGRES_PASSWORD: haskala
          BACKUP_DIR: /tmp/haskala-backups
          PGPASSWORD: haskala
        run: |
          set -euo pipefail
          mkdir -p "$BACKUP_DIR"

          python manage.py migrate --noinput

          python manage.py shell -c "
          from home.models import Book
          Book.objects.create(name='CI backup smoke probe')
          print('books before backup:', Book.objects.count())
          "

          bash docker/backups/backup.sh
          ls -lh "$BACKUP_DIR"/daily/haskala-*.sql.gz

          # Drop the entire schema so the restore really has to do work.
          psql --host=localhost --username=haskala --dbname=haskala \
               -v ON_ERROR_STOP=1 \
               -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"

          bash docker/backups/restore.sh latest

          # Monthly-rollover exercise: re-run the backup with a date
          # patched to "01" and confirm a monthly/ snapshot lands.
          mkdir -p /tmp/_datebin
          cat > /tmp/_datebin/date <<'PATCH'
          #!/bin/sh
          case "$*" in
              *"+%d"*) echo 01 ;;
              *"+%Y-%m"*) echo 2999-01 ;;
              *) exec /usr/bin/date "$@" ;;
          esac
          PATCH
          chmod +x /tmp/_datebin/date
          PATH=/tmp/_datebin:$PATH bash docker/backups/backup.sh
          ls -lh "$BACKUP_DIR"/monthly/haskala-2999-01.sql.gz

          python manage.py shell -c "
          from home.models import Book
          n = Book.objects.filter(name='CI backup smoke probe').count()
          print('probe row count after restore:', n)
          assert n == 1, f'restore lost the probe row, count={n}'
          "
